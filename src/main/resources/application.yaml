spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: sportvision
  profiles:
    active: dev
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  sendgrid:
    api-key: ${SENDGRID_API_KEY}
    from-email: ${SENDGRID_FROM_EMAIL}
  telegram:
    bot-token: ${TELEGRAM_BOT_TOKEN}
  verification-url: http://localhost:8080/api/v1/auth/verify
sportvision:
  stripe:
    secret-key: ${STRIPE_SECRET_KEY}
    success-url: "http://localhost:3000/payment/success" # Заглушка для фронтенда
    cancel-url: "http://localhost:3000/payment/cancel"   # Заглушка для фронтенда
    webhook-secret: ${STRIPE_WEBHOOK_SECRET}