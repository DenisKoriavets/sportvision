spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/sportvision_db
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      expiration: 900000
      refresh-token:
        expiration: 604800000
app:
  sendgrid:
    api-key: ${SENDGRID_API_KEY}
  verification-url: http://localhost:8080/api/v1/auth/verify