spring:
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

application:
  security:
    jwt:
      secret-key: "dummy_jwt_secret_key_for_testing_purposes_only_needs_to_be_long_enough"

app:
  sendgrid:
    api-key: "dummy_sendgrid_key"
    from-email: "test@sportvision.com"
  telegram:
    bot-token: "dummy_telegram_token"

sportvision:
  stripe:
    secret-key: "sk_test_dummy"
    webhook-secret: "whsec_dummy"