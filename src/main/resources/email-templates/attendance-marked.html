<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Відвідування тренування - SportVision</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fa;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: #2196f3;
            color: white;
            padding: 30px;
            text-align: center;
        }
        .content {
            padding: 35px;
            line-height: 1.6;
            color: #333;
        }
        .highlight {
            background: #e3f2fd;
            padding: 15px;
            border-left: 5px solid #2196f3;
            margin: 20px 0;
        }
        .footer {
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>✅ Відвідування відмічено</h1>
    </div>

    <div class="content">
        <p>Привіт, <strong th:text="${parentName}"></strong>!</p>

        <p>Статус відвідування для вашої дитини <strong th:text="${childName}"></strong> успішно відмічено.</p>

        <div class="highlight">
            <strong>Деталі тренування:</strong><br><br>
            📍 Секція: <span th:text="${sectionName}"></span><br>
            📅 Дата: <span th:text="${date}"></span><br>
            📊 Статус: <strong th:text="${status}"></strong>
        </div>

        <p>Дякуємо за відвідування!</p>
    </div>

    <div class="footer">
        <p>З повагою,<br>Команда SportVision</p>
    </div>
</div>
</body>
</html>
